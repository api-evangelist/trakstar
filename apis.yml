apis:
  - aid: trakstar:trakstar-hire-api
    name: Trakstar Hire API
    description: >-
      The Trakstar Hire REST API enables developers to manage openings,
      candidates, candidate messages, internal notes, interviews, reviews,
      evaluations, and to-dos programmatically. It returns JSON responses and
      uses API key authentication generated from the account's Super Admin
      settings. The most common use cases include building custom career sites
      and syncing opening or candidate data with external systems.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.recruiterbox.com/reference/introduction
    baseURL: https://companyname.hire.trakstar.com/api/v1/
    tags:
      - Hiring
      - Applicant Tracking
      - Recruiting
      - Candidates
      - Job Openings
    properties:
      - type: Documentation
        url: https://developers.recruiterbox.com/reference/introduction
      - type: OpenAPI
        url: https://developers.recruiterbox.com/llms.txt
    contact:
      - FN: Trakstar Hire Support
        url: https://support.hire.trakstar.com/article/1617-accessing-the-hire-api

  - aid: trakstar:trakstar-learn-api
    name: Trakstar Learn API
    description: >-
      The Trakstar Learn REST API allows developers to manage user accounts,
      group assignments, course and module enrollments, user status, and
      reporting programmatically. API keys are provisioned by the Trakstar Learn
      support team upon request. The API supports pagination and filtering and
      is fully self-service with implementation responsibility on the developer.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://support.learn.trakstar.com/article/815-workflow-api-documentation
    baseURL: https://api.learn.trakstar.com/
    tags:
      - Learning Management
      - Training
      - Course Enrollment
      - User Management
      - LMS
    properties:
      - type: Documentation
        url: https://support.learn.trakstar.com/article/815-workflow-api-documentation
    contact:
      - FN: Trakstar Learn Support
        email: learn@trakstar.com

