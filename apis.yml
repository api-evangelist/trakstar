aid: trakstar
name: Trakstar
description: >-
  Trakstar is an HR performance and talent management platform serving over
  3,000 companies with integrated tools for performance appraisals, goal
  alignment, 360-degree feedback, and employee development tracking. The
  platform comprises four core products — Hire (applicant tracking), Learn
  (learning management), Perform (performance management), and Insights
  (workforce analytics) — each exposing its own REST API. Trakstar Hire offers
  a v2 REST API for managing openings, candidates, interviews, evaluations, and
  reviews using API key authentication. Trakstar Learn provides a REST API for
  user account management, group assignments, course enrollment, and reporting.
  Acquired by Mitratech in April 2023, Trakstar is SOC 2, GDPR, and CCPA
  compliant and supports seamless integrations with HRIS, SSO, and
  communications applications.
